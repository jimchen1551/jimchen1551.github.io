EyelidMeasurement:
  abs: Purpose: To assess automated eyelid measurement from smartphone photographs for ptosis evaluation. Methods:Standardized orbital photographs from 411 volunteers (822 eyes; levator function [LF] available in 685 eyes) were used to train and test SE-ResNet, EfficientNet, and DINOv2 models for margin reflex distance 1 (MRD1), margin reflex distance 2 (MRD2), and LF prediction. Results: The best pretrained DINOv2 ViT-L model achieved mean absolute errors of 0.60 for MRD1, 0.48 for MRD2, and 1.43 for LF; DINOv2 also showed stable cross-task performance and favorable frozen-backbone results for mobile deployment. Conclusion: Automated smartphone-based eyelid analysis may provide an objective, scalable adjunct for oculoplastic screening and teleophthalmology.
  code: https://github.com/jimchen1551/EyelidMeasure
F2V:
  abs: Purpose : Visual field (VF) testing is the gold standard for glaucoma detection as it measures optic nerve function; however, color fundus photography (CFP) is easier to obtain and more feasible for screening purposes. The purpose of this study was to develop AI models that can use CFP as inputs to generate VF test results. Methods : This retrospective cross-sectional study included 14,959 CFP–VF pairs from 8,532 eyes of 4,486 patients seen at Tri-Service General Hospital, Taiwan (2018–2023). Reliable Humphrey 24-2 SITA VFs and macular-centered, 45° CFPs from the same eye and date were included. The dataset was split at the patient level into training (80%), validation (10%), and testing (10%) sets. A model using pre-trained RETFound as a frozen encoder paired with a transformer-based regression head was compared to a baseline model using a ResNet-based encoder followed by a fully connected regression head for the generation of VF sensitivities from the input CFPs. Performance metrics included mean absolute error (MAE) and root mean square error (RMSE) of mean sensitivity (MS), coefficient of determination (R2), and pointwise MAE maps (PW-MAE). Results : Patients were aged 55.3 ± 15.5 years, and the average global mean deviation value was -6.82±8.20. The RETFound model outperformed the ResNet baseline for MS estimation (MAE 2.82 vs. 3.82 dB; RMSE 4.38 vs. 5.56 dB; R2 0.70 vs. 0.51;). Pointwise MAE heatmaps showed lower error across the field compared with the baseline. Bland-Altman plots for both MS and MD showed improved agreement and narrower limits of agreement for RETFound relative to MLEDL, indicating more reliable global functional estimation from CFPs (Figure 1). Conclusions : A RETFound-based model with a transformer regression head substantially improves same-day VF estimation from macular-centered CFPs compared with an ResNet baseline. The combination of lower error, stronger correlation, and better agreement in MS and MD suggests that foundation model–based structure–function mapping may provide clinically meaningful VF surrogates in settings where perimetry is unavailable, unreliable, or infeasible.
  code:
Eyelid:
  abs: Accurate measurement of eyelid parameters such as Margin Reflex Distances (MRD1, MRD2) and Levator Function (LF) is critical in oculoplastic diagnostics but remains limited by manual, inconsistent methods. This study evaluates deep learning models--SE-ResNet, EfficientNet, and the vision transformer-based DINOv2 for automating these measurements using smartphone-acquired images. We assess performance across frozen and fine-tuned settings, using MSE, MAE, and R2 metrics. DINOv2, pretrained through self-supervised learning, demonstrates superior scalability and robustness, especially under frozen conditions ideal for mobile deployment. Lightweight regressors such as MLP and Deep Ensemble offer high precision with minimal computational overhead. To address class imbalance and improve generalization, we integrate focal loss, orthogonal regularization, and binary encoding strategies. Our results show that DINOv2 combined with these enhancements delivers consistent, accurate predictions across all tasks, making it a strong candidate for real-world, mobile-friendly clinical applications. This work highlights the potential of foundation models in advancing AI-powered ophthalmic care.
  code: https://github.com/jimchen1551/EyelidMeasure
FastRx: 
  abs: Personalized medication recommendations aim to suggest a set of medications based on the clinical conditions of a patient. Not only should the patient’s diagnosis, procedure, and medication history be considered, but drug-drug interactions (DDIs) must also be taken into account to prevent adverse drug reactions. Although recent studies on medication recommendation have considered DDIs and patient history, personalized disease progression and prescription have not been explicitly modeled. In this work, we proposed FastRx, a Fastformer-based medication recommendation model to capture longitudinality in patient history, in combination with Graph Convolutional Networks (GCNs) to handle DDIs and co-prescribed medications in Electronic Health Records (EHRs). Our extensive experiments on the MIMIC-III dataset demonstrated superior performance of the proposed FastRx over existing state-of-the-art models for medication recommendation. 
  code: https://github.com/pnmthao/FastRx.git
  paper: files/local/fastrx.pdf
LVFP: 
  abs: Glaucoma is the leading cause of irreversible blindness worldwide. The clinical standard for glaucoma diagnosis and progression tracking remains visual field (VF) testing via standard automated perimetry. One outstanding challenge of many ophthalmic prediction tasks is the issue of class imbalance, where the majority class outnumbers the minority class(es). Although this issue has been reported in several prior studies on the prediction of VF progression or glaucoma, it has not been addressed in the context of longitudinal VF data. In this work, we proposed, VF-Transformer, a transformer-based framework for VF progression prediction based on longitudinal VF examination results. In particular, we addressed the class imbalance issue by incorporating our proposed inverted class-dependent temperature (ICDT) loss and weight normalization. The proposed framework was developed and evaluated on a public VF dataset and further validated on an external hospital dataset, using accuracy, sensitivity, specificity, and area under the receiver operating characteristic curve (AUC) as evaluation metrics. Extensive experiments and comparisons with existing state-of-the-art methods and class imbalance handling strategies confirmed the effectiveness of the proposed framework in predicting VF progression in the presence of class imbalance.
  code: https://github.com/lchentw/lab4.git
  paper: files/local/icdt.pdf
MHWCH:
  abs: Introduction: White-coat hypertension (WCH) and masked hypertension (MH) complicate accurate blood pressure (BP) monitoring. While ambulatory BP monitoring (ABPM) is effective, its high cost and limited availability are significant barriers. Hypothesis: We hypothesized that a machine learning (ML) model using clinical data from a single outpatient visit could accurately predict WCH and MH. Aims: This study aimed to develop and validate ML-based prediction models for WCH and MH using accessible clinical data to improve diagnostic efficiency and accessibility. Methods: We enrolled patients from two hypertension cohorts, after excluding those with incomplete data. Patients were classified by office BP and ABPM readings per American Heart Association guidelines. ML models, including Multi-layer Perceptron （MLP）, Support Vector Machine (SVM), and Tabular Prior-Data Fitted Network (Tab-PFN), were developed. Input parameters included demographic data (age, gender, height, weight, smoker), and office BP (OBP) and heart rate measurements. Principal Component Analysis (PCA), kernel PCA (kPCA), or t-distributed stochastic neighbor embedding (t-SNE) were used to improve class separability. Results: The study population comprised 1481 participants with a mean age of 47.6 years (SD 13.6), 65\% of whom were male and 20.1\% were smokers. OBP measurements showed a mean systolic BP (SBP) of 128.7 mmHg (SD 15.4) and a mean diastolic BP (DBP) of 84.2 mmHg (SD 11.6). ABPM showed a mean 24-hour systolic BP of 122.5 mmHg (SD 11.8) and diastolic BP of 79.3 mmHg (SD 10.1). The inclusion of demographic and OBP data, along with advanced resampling and dimensionality reduction techniques, significantly improved the model’s predictive ability. The final TabPFN model achieved the best performance with recall, precision, F1 score, and accuracy of 0.747, 0.931, 0.829, and 0.807 for WCH, and 0.713, 0.954, 0.816, and 0.907 for MH. Conclusion: Our ML-based model effectively predicts WCH and MH using accessible clinical data, offering a cost-effective alternative before applying ABPM.
  code: https://github.com/jimchen1551/MH-WCH
